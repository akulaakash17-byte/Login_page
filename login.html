<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 flex items-center justify-center h-screen">
  <div class="w-full max-w-sm p-8 bg-zinc-900 rounded-2xl border border-zinc-800 shadow-xl">
    <div class="mb-8">
        <div class="h-12 w-12 bg-blue-600 rounded-lg mb-4 flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <h2 class="text-2xl font-bold text-white">Login</h2>
        <p class="text-zinc-400">Welcome back! Please enter your details.</p>
    </div>

    <div class="space-y-4">
      <input id="username" placeholder="Username" class="w-full p-3 bg-zinc-800 rounded-lg text-white border border-transparent focus:border-blue-600 outline-none transition-all">
      <input id="password" type="password" placeholder="Password" class="w-full p-3 bg-zinc-800 rounded-lg text-white border border-transparent focus:border-blue-600 outline-none transition-all">
      <button onclick="login()" class="w-full py-3 px-4 bg-white hover:bg-zinc-200 text-black font-bold rounded-lg transition-colors">Sign In</button>
    </div>
    
    <p class="mt-6 text-center text-zinc-500 text-sm">Need an account? <a href="signup.html" class="text-blue-500 hover:text-blue-400">Sign up</a></p>
  </div>

  <script>
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const res = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      alert(await res.text());
    }
  </script>
</body>
</html>
